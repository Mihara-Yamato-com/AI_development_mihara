<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>GantForge</title>
<style>
/* ==== Section: Base Layout ==== */
:root {
  font-family: -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", sans-serif;
}

body {
  margin: 0;
  padding: 0;
}

.app-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: #1f2937;
  color: #fff;
}

.app-header select,
.app-header button {
  font-size: 14px;
  padding: 4px 8px;
}

/* ==== Section: Toolbar ==== */
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  background: #f3f4f6;
  border-bottom: 1px solid #d1d5db;
}

.toolbar button {
  font-size: 14px;
  padding: 4px 8px;
}

/* ==== Section: Main Area / Schedule Table ==== */
.main-area {
  display: flex;
}

.schedule-table {
  flex: 1;
  padding: 12px;
}

.schedule-table table {
  border-collapse: collapse;
  width: 100%;
}

.schedule-table th,
.schedule-table td {
  border: 1px solid #d1d5db;
  padding: 0 8px;
  font-size: 13px;
  text-align: left;
  height: 28px;
  box-sizing: border-box;
  overflow: hidden;
  white-space: nowrap;
}

.schedule-table thead th {
  height: 20px;
}

.toggle-arrow {
  display: inline-block;
  width: 14px;
  cursor: pointer;
  user-select: none;
}

.toggle-spacer {
  display: inline-block;
  width: 14px;
}

.schedule-table .status-select {
  font-size: 12px;
  padding: 2px;
}

.schedule-table .row-actions {
  white-space: nowrap;
}

.schedule-table .row-actions button {
  visibility: hidden;
  font-size: 11px;
  padding: 2px 4px;
  margin-right: 2px;
}

.schedule-table tr.schedule-row:hover .row-actions button {
  visibility: visible;
}

.gantt-chart {
  flex: 1;
  padding: 12px;
  color: #6b7280;
  font-size: 13px;
  overflow-x: auto;
}

/* ==== Section: Gantt Chart Rendering ==== */
.gantt-scroll {
  position: relative;
  display: inline-block;
}

.gantt-header {
  display: flex;
  height: 20px;
  border-bottom: 1px solid #d1d5db;
}

.gantt-header-cell {
  flex: 0 0 auto;
  font-size: 11px;
  text-align: center;
  border-right: 1px solid #e5e7eb;
  padding: 2px 0;
  box-sizing: border-box;
  overflow: hidden;
}

.gantt-header-cell.is-saturday {
  background: #dbeafe;
  color: #1d4ed8;
}

.gantt-header-cell.is-sunday-holiday {
  background: #fee2e2;
  color: #b91c1c;
}

.day-bg {
  position: absolute;
  top: 0;
  pointer-events: none;
}

.day-bg-saturday {
  background: rgba(59, 130, 246, 0.08);
}

.day-bg-sunday-holiday {
  background: rgba(239, 68, 68, 0.08);
}

.gantt-row {
  position: relative;
  height: 28px;
  border-bottom: 1px solid #f3f4f6;
}

.gantt-bar {
  position: absolute;
  top: 4px;
  height: 20px;
  background: #3b82f6;
  color: #fff;
  font-size: 12px;
  border-radius: 3px;
  padding: 0 4px;
  white-space: nowrap;
  overflow: hidden;
  box-sizing: border-box;
}

.today-line {
  position: absolute;
  top: 0;
  width: 2px;
  background: #ef4444;
  pointer-events: none;
}

.grid-line {
  position: absolute;
  top: 0;
  width: 1px;
  background: #e5e7eb;
  pointer-events: none;
}

.milestone-line {
  position: absolute;
  top: 0;
  width: 2px;
  background: #a855f7;
  pointer-events: none;
}

.milestone-marker {
  position: absolute;
  top: 0;
  width: 0;
  height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-top: 8px solid #a855f7;
  transform: translateX(-6px);
  cursor: default;
}

/* ==== Section: Modal ==== */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-overlay[hidden] {
  display: none;
}

.modal-box {
  background: #fff;
  padding: 16px 20px;
  border-radius: 6px;
  width: 360px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.modal-box h2 {
  margin: 0 0 8px;
  font-size: 16px;
}

.modal-box input,
.modal-box textarea {
  font-size: 14px;
  padding: 4px 6px;
  box-sizing: border-box;
  width: 100%;
}

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 8px;
}

.modal-box hr {
  width: 100%;
  border: none;
  border-top: 1px solid #e5e7eb;
  margin: 4px 0;
}

.modal-box h3 {
  margin: 0;
  font-size: 14px;
}

.comment-list {
  max-height: 140px;
  overflow-y: auto;
  border: 1px solid #e5e7eb;
  border-radius: 4px;
  padding: 4px 8px;
}

.comment-list-item {
  font-size: 13px;
  padding: 4px 0;
  border-bottom: 1px solid #f3f4f6;
}

.comment-list-item .comment-timestamp {
  display: block;
  font-size: 11px;
  color: #6b7280;
}

.milestone-list-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
  padding: 2px 0;
  border-bottom: 1px solid #f3f4f6;
}

.milestone-list-item button {
  font-size: 12px;
}

/* ==== Section: Lock ==== */
button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.modal-box input:disabled,
.modal-box textarea:disabled {
  background: #e5e7eb;
  cursor: not-allowed;
}

#btn-toggle-lock.is-locked {
  background: #b91c1c;
  color: #fff;
}

/* ==== Section: Side Panel (共通の枠組み) ==== */
.side-panel {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: 320px;
  background: #fff;
  box-shadow: -2px 0 8px rgba(0, 0, 0, 0.15);
  box-sizing: border-box;
  padding: 12px;
  display: flex;
  flex-direction: column;
  z-index: 10;
}

.side-panel[hidden] {
  display: none;
}

.side-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.side-panel-header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.side-panel-header h2 {
  margin: 0;
  font-size: 16px;
}

.side-panel-body {
  overflow-y: auto;
  flex: 1;
}

.history-list-item {
  font-size: 13px;
  padding: 6px 0;
  border-bottom: 1px solid #f3f4f6;
}

.history-list-item .history-timestamp {
  display: block;
  font-size: 11px;
  color: #6b7280;
}

/* ==== Section: Memo Panel ==== */
.memo-panel {
  width: 780px;
}

.memo-panel-body {
  display: flex;
  gap: 10px;
  flex: 1;
  min-height: 0;
}

.memo-list-column {
  width: 170px;
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  border-right: 1px solid #e5e7eb;
  padding-right: 8px;
}

.memo-list-column #btn-new-memo {
  margin-bottom: 8px;
}

#memo-list {
  flex: 1;
  overflow-y: auto;
}

.memo-list-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 4px;
  padding: 4px 6px;
  font-size: 13px;
  border-radius: 4px;
  cursor: pointer;
}

.memo-list-item:hover {
  background: #f3f4f6;
}

.memo-list-item.is-selected {
  background: #e0e7ff;
}

.memo-list-item .memo-list-item-title {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.memo-list-item button {
  font-size: 11px;
  flex: 0 0 auto;
}

.memo-editor-column {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
}

#memo-title-input {
  font-size: 14px;
  padding: 4px 6px;
  box-sizing: border-box;
  margin-bottom: 6px;
}

.memo-view-toggle {
  display: flex;
  gap: 4px;
  margin-bottom: 6px;
}

.memo-view-toggle button.is-active {
  background: #3b82f6;
  color: #fff;
}

.memo-editor-area {
  flex: 1;
  display: flex;
  gap: 8px;
  min-height: 0;
}

.memo-body-textarea {
  flex: 1;
  font-family: monospace;
  font-size: 13px;
  padding: 6px;
  box-sizing: border-box;
  resize: none;
}

.memo-preview-pane {
  flex: 1;
  overflow-y: auto;
  padding: 6px 10px;
  border: 1px solid #e5e7eb;
  border-radius: 4px;
  font-size: 13px;
  box-sizing: border-box;
}

.memo-preview-pane h1,
.memo-preview-pane h2,
.memo-preview-pane h3 {
  margin: 8px 0 4px;
}

.memo-preview-pane p {
  margin: 4px 0;
}

/* ==== Section: Quick Memo Panel ==== */
#quick-memo-input {
  font-size: 14px;
  padding: 4px 6px;
  box-sizing: border-box;
  width: 100%;
  resize: vertical;
}

.quick-memo-list-item {
  font-size: 13px;
  padding: 6px 0;
  border-bottom: 1px solid #f3f4f6;
  display: flex;
  justify-content: space-between;
  gap: 6px;
}

.quick-memo-list-item pre {
  white-space: pre-wrap;
  word-break: break-word;
  font-family: inherit;
  margin: 2px 0 0;
}

.quick-memo-list-item .quick-memo-timestamp {
  display: block;
  font-size: 11px;
  color: #6b7280;
}

.quick-memo-list-item button {
  font-size: 11px;
  flex: 0 0 auto;
}
</style>
</head>
<body>
<header class="app-header">
  <label for="project-select">プロジェクト:</label>
  <select id="project-select"></select>
  <button id="btn-new-project">新規プロジェクト作成</button>
  <button id="btn-delete-project">プロジェクト削除</button>
</header>

<div class="toolbar">
  <button id="btn-toggle-lock">ロック</button>
  <button id="btn-add-schedule">スケジュール追加</button>
  <label for="period-select">表示単位:</label>
  <select id="period-select">
    <option value="day">日</option>
    <option value="week">週</option>
    <option value="month">月</option>
    <option value="quarter">3ヶ月</option>
  </select>
  <button id="btn-today">今日</button>
  <button id="btn-expand-all">全て開く</button>
  <span>表示列:</span>
  <label><input type="checkbox" id="col-toggle-start" checked>開始</label>
  <label><input type="checkbox" id="col-toggle-end" checked>終了</label>
  <label><input type="checkbox" id="col-toggle-status" checked>状態</label>
  <button id="btn-milestones">マイルストーン</button>
  <button id="btn-comments">コメント</button>
  <button id="btn-edit-project">編集</button>
  <button id="btn-history">変更履歴</button>
  <button id="btn-memos">メモ</button>
  <button id="btn-quick-memos">即時メモ</button>
</div>

<main class="main-area">
  <section id="schedule-table-container" class="schedule-table"></section>
  <section id="gantt-chart-container" class="gantt-chart"></section>
</main>

<div id="project-edit-modal" class="modal-overlay" hidden>
  <div class="modal-box">
    <h2>プロジェクト概要編集</h2>
    <label for="edit-project-name">プロジェクト名</label>
    <input id="edit-project-name" type="text">
    <label for="edit-project-description">説明</label>
    <textarea id="edit-project-description" rows="4"></textarea>
    <div class="modal-actions">
      <button id="btn-cancel-edit-project">キャンセル</button>
      <button id="btn-save-edit-project">保存</button>
    </div>
  </div>
</div>

<div id="schedule-add-modal" class="modal-overlay" hidden>
  <div class="modal-box">
    <h2>スケジュール追加</h2>
    <label for="schedule-add-title">作業内容</label>
    <input id="schedule-add-title" type="text">
    <label for="schedule-add-start-date">開始日</label>
    <input id="schedule-add-start-date" type="date">
    <label for="schedule-add-end-date">終了日</label>
    <input id="schedule-add-end-date" type="date">
    <label for="schedule-add-parent">親項目</label>
    <select id="schedule-add-parent"></select>
    <div class="modal-actions">
      <button id="btn-cancel-add-schedule">キャンセル</button>
      <button id="btn-confirm-add-schedule">追加</button>
    </div>
  </div>
</div>

<div id="milestone-modal" class="modal-overlay" hidden>
  <div class="modal-box">
    <h2>マイルストーン設定</h2>
    <div id="milestone-list"></div>
    <label for="milestone-date">日付</label>
    <input id="milestone-date" type="date">
    <label for="milestone-label">ラベル</label>
    <input id="milestone-label" type="text">
    <div class="modal-actions">
      <button id="btn-close-milestone-modal">閉じる</button>
      <button id="btn-add-milestone">追加</button>
    </div>
  </div>
</div>

<div id="schedule-edit-modal" class="modal-overlay" hidden>
  <div class="modal-box">
    <h2>スケジュール編集</h2>
    <label for="schedule-edit-title">作業内容</label>
    <input id="schedule-edit-title" type="text">
    <label for="schedule-edit-start-date">開始日</label>
    <input id="schedule-edit-start-date" type="date">
    <label for="schedule-edit-end-date">終了日</label>
    <input id="schedule-edit-end-date" type="date">
    <div class="modal-actions">
      <button id="btn-cancel-edit-schedule">キャンセル</button>
      <button id="btn-save-edit-schedule">保存</button>
    </div>
    <hr>
    <h3>コメント</h3>
    <div id="schedule-comment-list" class="comment-list"></div>
    <textarea id="schedule-comment-input" rows="2" placeholder="コメントを入力"></textarea>
    <div class="modal-actions">
      <button id="btn-send-comment">送信</button>
    </div>
  </div>
</div>

<aside id="history-panel" class="side-panel" hidden>
  <div class="side-panel-header">
    <h2>変更履歴</h2>
    <button id="btn-close-history-panel">閉じる</button>
  </div>
  <div id="history-list" class="side-panel-body"></div>
</aside>

<aside id="memo-panel" class="side-panel memo-panel" hidden>
  <div class="side-panel-header">
    <h2>メモ</h2>
    <div class="side-panel-header-right">
      <span id="memo-count">0件</span>
      <button id="btn-close-memo-panel">閉じる</button>
    </div>
  </div>
  <div class="memo-panel-body">
    <div class="memo-list-column">
      <button id="btn-new-memo">新規メモ</button>
      <div id="memo-list"></div>
    </div>
    <div class="memo-editor-column">
      <input id="memo-title-input" type="text" placeholder="メモの名前" disabled>
      <div class="memo-view-toggle">
        <button id="btn-memo-view-edit" class="is-active">編集</button>
        <button id="btn-memo-view-preview">プレビュー</button>
        <button id="btn-memo-view-split">分割</button>
      </div>
      <div id="memo-editor-area" class="memo-editor-area">
        <textarea id="memo-body-input" class="memo-body-textarea" placeholder="Markdownで記述できます" disabled></textarea>
        <div id="memo-preview-pane" class="memo-preview-pane" hidden></div>
      </div>
    </div>
  </div>
</aside>

<aside id="quick-memo-panel" class="side-panel" hidden>
  <div class="side-panel-header">
    <h2>即時メモ</h2>
    <button id="btn-close-quick-memo-panel">閉じる</button>
  </div>
  <textarea id="quick-memo-input" rows="3" placeholder="メモを入力(Markdown記法可、表示はそのまま)"></textarea>
  <div class="modal-actions">
    <button id="btn-add-quick-memo">追加</button>
  </div>
  <div id="quick-memo-list" class="side-panel-body"></div>
</aside>

<aside id="comment-panel" class="side-panel" hidden>
  <div class="side-panel-header">
    <h2>コメント</h2>
    <button id="btn-close-comment-panel">閉じる</button>
  </div>
  <div id="comment-panel-list" class="side-panel-body"></div>
</aside>

<script>
(function () {
  "use strict";

  /* ==== Section: 初期化 ==== */
  const DB_NAME = "GantForgeDB";
  const DB_VERSION = 8;
  const STORE_PROJECTS = "projects";
  const STORE_SCHEDULE_ITEMS = "scheduleItems";
  const INDEX_SCHEDULE_ITEMS_BY_PROJECT = "by_projectId";
  const STORE_MILESTONES = "milestones";
  const INDEX_MILESTONES_BY_PROJECT = "by_projectId";
  const STORE_CHANGE_LOGS = "changeLogs";
  const INDEX_CHANGE_LOGS_BY_PROJECT = "by_projectId";
  const STORE_MEMOS = "memos";
  const INDEX_MEMOS_BY_PROJECT = "by_projectId";
  const STORE_QUICK_MEMOS = "quickMemos";
  const INDEX_QUICK_MEMOS_BY_PROJECT = "by_projectId";
  const STORE_COMMENTS = "comments";
  const INDEX_COMMENTS_BY_SCHEDULE_ITEM = "by_scheduleItemId";

  const STATUS_NOT_STARTED = "未着手";
  const STATUS_IN_PROGRESS = "進行中";
  const STATUS_DONE = "完了";
  const STATUS_OPTIONS = [STATUS_NOT_STARTED, STATUS_IN_PROGRESS, STATUS_DONE];

  const PERIOD_DAY_WIDTH_PX = {
    day: 24,
    week: 10,
    month: 5,
    quarter: 3,
  };

  let db = null;
  let currentProjectId = null;
  let currentPeriod = "day";
  let currentProjectLocked = false;
  let isExpandAllToggled = false;
  let visibleColumns = { startDate: true, endDate: true, status: true };
  let editingScheduleItemId = null;
  let currentMemoId = null;
  let memoViewMode = "edit";
  let memoSaveTimer = null;

  document.addEventListener("DOMContentLoaded", init);

  async function init() {
    try {
      db = await openDatabase();
    } catch (error) {
      window.alert(
        "IndexedDBを開けませんでした（" + error.name + ": " + error.message + "）。\n" +
        "他のバージョンのGantForgeを試したブラウザだと、DBのバージョンが噛み合わなくなることがあります。\n" +
        "DevTools > Application > IndexedDB で GantForgeDB を削除してから、このタブだけ開き直してください。"
      );
      return;
    }
    await refreshProjectSelect();
    await renderMainArea();
    renderExpandAllButton();
    bindEvents();
  }

  /**
   * スケジュール表とガントチャートをまとめて再描画する
   * @returns {Promise<void>}
   */
  async function renderMainArea() {
    await renderScheduleTable();
    await renderGanttChart();
  }

  /* ==== Section: データ層(IndexedDB) ==== */

  /**
   * IndexedDBを開き、初回はオブジェクトストアを作成する
   * @returns {Promise<IDBDatabase>}
   */
  function openDatabase() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, DB_VERSION);

      request.onupgradeneeded = (event) => {
        const database = event.target.result;

        if (!database.objectStoreNames.contains(STORE_PROJECTS)) {
          database.createObjectStore(STORE_PROJECTS, {
            keyPath: "id",
            autoIncrement: true,
          });
        }

        if (!database.objectStoreNames.contains(STORE_SCHEDULE_ITEMS)) {
          const scheduleStore = database.createObjectStore(STORE_SCHEDULE_ITEMS, {
            keyPath: "id",
            autoIncrement: true,
          });
          scheduleStore.createIndex(INDEX_SCHEDULE_ITEMS_BY_PROJECT, "projectId", {
            unique: false,
          });
        }

        if (!database.objectStoreNames.contains(STORE_MILESTONES)) {
          const milestoneStore = database.createObjectStore(STORE_MILESTONES, {
            keyPath: "id",
            autoIncrement: true,
          });
          milestoneStore.createIndex(INDEX_MILESTONES_BY_PROJECT, "projectId", {
            unique: false,
          });
        }

        if (!database.objectStoreNames.contains(STORE_CHANGE_LOGS)) {
          const changeLogStore = database.createObjectStore(STORE_CHANGE_LOGS, {
            keyPath: "id",
            autoIncrement: true,
          });
          changeLogStore.createIndex(INDEX_CHANGE_LOGS_BY_PROJECT, "projectId", {
            unique: false,
          });
        }

        if (!database.objectStoreNames.contains(STORE_MEMOS)) {
          const memoStore = database.createObjectStore(STORE_MEMOS, {
            keyPath: "id",
            autoIncrement: true,
          });
          memoStore.createIndex(INDEX_MEMOS_BY_PROJECT, "projectId", {
            unique: false,
          });
        }

        if (!database.objectStoreNames.contains(STORE_QUICK_MEMOS)) {
          const quickMemoStore = database.createObjectStore(STORE_QUICK_MEMOS, {
            keyPath: "id",
            autoIncrement: true,
          });
          quickMemoStore.createIndex(INDEX_QUICK_MEMOS_BY_PROJECT, "projectId", {
            unique: false,
          });
        }

        if (!database.objectStoreNames.contains(STORE_COMMENTS)) {
          const commentStore = database.createObjectStore(STORE_COMMENTS, {
            keyPath: "id",
            autoIncrement: true,
          });
          commentStore.createIndex(INDEX_COMMENTS_BY_SCHEDULE_ITEM, "scheduleItemId", {
            unique: false,
          });
        }
      };

      request.onsuccess = (event) => resolve(event.target.result);
      request.onerror = (event) => reject(event.target.error);
    });
  }

  /* ---- Sub-section: Projects ---- */

  /**

  /**
   * epoch msをYYYY-MM-DD HH:MM形式の文字列にする
   * @param {number} timestamp
   * @returns {string}
   */
  function formatTimestamp(timestamp) {
    const date = new Date(timestamp);
    const pad = (n) => String(n).padStart(2, "0");
    return (
      date.getFullYear() + "-" + pad(date.getMonth() + 1) + "-" + pad(date.getDate()) +
      " " + pad(date.getHours()) + ":" + pad(date.getMinutes())
    );
  }

  /* ---- Sub-section: Markdown Rendering ---- */

  /**
   * 簡易マークダウンをHTMLに変換する（見出し#〜###・太字・斜体・インラインコード・箇条書き・段落のみ対応）
   * @param {string} source
   * @returns {string}
   */
  function renderMarkdown(source) {
    const applyInline = (text) => {
      let html = escapeHtml(text);
      html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
      html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      html = html.replace(/\*([^*]+)\*/g, "<em>$1</em>");
      return html;
    };

    const lines = source.split("\n");
    const htmlParts = [];
    let listItems = null;

    const flushList = () => {
      if (listItems) {
        htmlParts.push("<ul>" + listItems.join("") + "</ul>");
        listItems = null;
      }
    };

    lines.forEach((line) => {
      const headerMatch = line.match(/^(#{1,3})\s+(.*)$/);
      if (headerMatch) {
        flushList();
        const level = headerMatch[1].length;
        htmlParts.push("<h" + level + ">" + applyInline(headerMatch[2]) + "</h" + level + ">");
        return;
      }
      const listMatch = line.match(/^[-*]\s+(.*)$/);
      if (listMatch) {
        if (!listItems) listItems = [];
        listItems.push("<li>" + applyInline(listMatch[1]) + "</li>");
        return;
      }
      flushList();
      if (line.trim() === "") {
        return;
      }
      htmlParts.push("<p>" + applyInline(line) + "</p>");
    });
    flushList();

    return htmlParts.join("") || "<p><em>(内容がありません)</em></p>";
  }

  /**
   * フラットなスケジュール項目配列から、親子関係(parentId)と折りたたみ状態(collapsed)を
   * 反映した表示順のリストを作る(深さ優先)
   * @param {Array<Object>} items
   * @param {Object} [options]
   * @param {boolean} [options.ignoreCollapsed] - trueの場合、折りたたみ状態を無視して全展開する
   * @returns {Array<{item: Object, depth: number, hasChildren: boolean}>}
   */
  function buildVisibleScheduleList(items, options) {
    const ignoreCollapsed = Boolean(options && options.ignoreCollapsed);
    const childrenByParentId = new Map();

    items.forEach((item) => {
      const parentId = item.parentId || null;
      if (!childrenByParentId.has(parentId)) {
        childrenByParentId.set(parentId, []);
      }
      childrenByParentId.get(parentId).push(item);
    });

    const result = [];

    function visit(parentId, depth) {
      const children = childrenByParentId.get(parentId) || [];
      children.forEach((item) => {
        const hasChildren = (childrenByParentId.get(item.id) || []).length > 0;
        result.push({ item: item, depth: depth, hasChildren: hasChildren });
        if (ignoreCollapsed || !item.collapsed) {
          visit(item.id, depth + 1);
        }
      });
    }

    visit(null, 0);
    return result;
  }

  async function renderScheduleTable() {
    const container = document.getElementById("schedule-table-container");

    if (currentProjectId === null) {
      container.innerHTML = "<p>プロジェクトを選択・作成してください</p>";
      return;

    const items = await getScheduleItemsByProject(currentProjectId);

    if (items.length === 0) {
      container.innerHTML = "<p>スケジュール項目がありません</p>";
      return;
    }

    const visibleList = buildVisibleScheduleList(items);

    const headerCells =
      "<th>作業内容</th>" +
      (visibleColumns.startDate ? "<th>開始</th>" : "") +
      (visibleColumns.endDate ? "<th>終了</th>" : "") +
      (visibleColumns.status ? "<th>状態</th>" : "") +
      "<th>操作</th>";

    const statusOptionsHtml = (item) =>
      STATUS_OPTIONS
        .map((value) => {
          const selected = value === item.status ? " selected" : "";
          return "<option value=\"" + escapeHtml(value) + "\"" + selected + ">" + escapeHtml(value) + "</option>";
        })
        .join("");

    const rows = visibleList
      .map((entry) => {
        const item = entry.item;
        const siblings = items.filter((i) => (i.parentId || null) === (item.parentId || null));
        const siblingIndex = siblings.findIndex((i) => i.id === item.id);
        const isFirst = siblingIndex === 0;
        const isLast = siblingIndex === siblings.length - 1;
        const disabledAttr = currentProjectLocked ? " disabled" : "";

        const toggle = entry.hasChildren
          ? "<span class=\"toggle-arrow\" data-toggle-id=\"" + item.id + "\">" +
            (item.collapsed ? "▶" : "▼") +
            "</span>"
          : "<span class=\"toggle-spacer\"></span>";
        const indentPx = entry.depth * 16 + 4;
        const startCell = visibleColumns.startDate ? "<td>" + escapeHtml(item.startDate) + "</td>" : "";
        const endCell = visibleColumns.endDate ? "<td>" + escapeHtml(item.endDate) + "</td>" : "";
        const statusCell = visibleColumns.status
          ? "<td><select class=\"status-select\" data-item-id=\"" + item.id + "\"" + disabledAttr + ">" + statusOptionsHtml(item) + "</select></td>"
          : "";
        return (
          "<tr class=\"schedule-row\" data-item-id=\"" + item.id + "\">" +
          "<td style=\"padding-left:" + indentPx + "px\">" + toggle + escapeHtml(item.title) + "</td>" +
          startCell + endCell + statusCell +
          "<td class=\"row-actions\">" +
          "<button class=\"btn-row-edit\" data-item-id=\"" + item.id + "\" title=\"編集\">編集</button>" +
          "<button class=\"btn-row-delete\" data-item-id=\"" + item.id + "\" title=\"削除\"" + disabledAttr + ">削除</button>" +
          "<button class=\"btn-row-move-up\" data-item-id=\"" + item.id + "\" title=\"上へ\"" + (isFirst || currentProjectLocked ? " disabled" : "") + ">▲</button>" +
          "<button class=\"btn-row-move-down\" data-item-id=\"" + item.id + "\" title=\"下へ\"" + (isLast || currentProjectLocked ? " disabled" : "") + ">▼</button>" +
          "</td>" +
          "</tr>"
        );
      })
      .join("");

    container.innerHTML =
      "<table>" +
      "<thead><tr>" + headerCells + "</tr></thead>" +
      "<tbody>" + rows + "</tbody>" +
      "</table>";
  }

  /**

  /* ---- Sub-section: Gantt Chart Rendering ---- */

  /**
   * YYYY-MM-DD形式の文字列を、ローカル日付のDateに変換する
   * @param {string} dateStr
   * @returns {Date}
   */
  function parseDateStr(dateStr) {
    return new Date(dateStr + "T00:00:00");
  }

  /**
   * YYYY-MM-DD形式の、実在する日付の文字列かどうかを判定する
   * @param {string} dateStr
   * @returns {boolean}
   */
  function isValidDateStr(dateStr) {
    if (!/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
      return false;
    }
    return !isNaN(parseDateStr(dateStr).getTime());
  }

  /**
   * 2つの日付の差を日数で返す（b - a）
   * @param {Date} a
   * @param {Date} b
   * @returns {number}
   */
  function diffInDays(a, b) {
    return Math.round((b.getTime() - a.getTime()) / 86400000);
  }

  /**
   * ガントチャートのヘッダーに表示する日付ラベルを作る（例: 7/14）
   * @param {Date} date
   * @returns {string}
   */
  function formatDateLabel(date) {
    return (date.getMonth() + 1) + "/" + date.getDate();
  }

  /**
   * 今日の0時のDateを返す
   * @returns {Date}
   */
  function getToday() {
    const now = new Date();
    now.setHours(0, 0, 0, 0);
    return now;
  }

  /* ---- Sub-section: Japanese Holiday Calculation ---- */

  const holidaysByYearCache = {};

  /**
   * YYYY-MM-DD形式のキー文字列を作る
   * @param {number} year
   * @param {number} month - 1-12
   * @param {number} day
   * @returns {string}
   */
  function toDateKey(year, month, day) {
    const mm = String(month).padStart(2, "0");
    const dd = String(day).padStart(2, "0");
    return year + "-" + mm + "-" + dd;
  }

  /**
   * DateをYYYY-MM-DD形式のキー文字列に変換する
   * @param {Date} date
   * @returns {string}
   */
  function dateToKey(date) {
    return toDateKey(date.getFullYear(), date.getMonth() + 1, date.getDate());
  }

  /**
   * 指定した月の第nth月曜日のDateを返す（ハッピーマンデー祝日用）
   * @param {number} year
   * @param {number} month - 1-12
   * @param {number} nth
   * @returns {Date}
   */
  function getNthMondayOfMonth(year, month, nth) {
    const firstOfMonth = new Date(year, month - 1, 1);
    const dayOffsetToMonday = (8 - firstOfMonth.getDay()) % 7;
    const day = 1 + dayOffsetToMonday + (nth - 1) * 7;
    return new Date(year, month - 1, day);
  }

  /**
   * 春分の日・秋分の日を近似式で計算する（2000〜2099年の範囲で有効）
   * @param {number} year
   * @param {"spring"|"autumn"} season
   * @returns {number} 日(day)
   */
  function getEquinoxDay(year, season) {
    const base = season === "spring" ? 20.8431 : 23.2488;
    return Math.floor(base + 0.242194 * (year - 1980) - Math.floor((year - 1980) / 4));
  }

  /**
   * 前後を祝日に挟まれた平日を「国民の休日」として追加する
   * @param {Object<string,string>} holidays
   */
  function applyCitizensHoliday(holidays) {
    const dates = Object.keys(holidays)
      .map((key) => parseDateStr(key))
      .sort((a, b) => a.getTime() - b.getTime());

    for (let i = 0; i < dates.length - 1; i++) {
      if (diffInDays(dates[i], dates[i + 1]) !== 2) continue;
      const between = new Date(dates[i]);
      between.setDate(between.getDate() + 1);
      const key = dateToKey(between);
      if (!holidays[key] && between.getDay() !== 0) {
        holidays[key] = "国民の休日";
      }
    }
  }

  /**
   * 日曜日と重なる祝日に振替休日を追加する
   * @param {Object<string,string>} holidays
   */
  function applySubstituteHolidays(holidays) {
    const sundayHolidayDates = Object.keys(holidays)
      .map((key) => parseDateStr(key))
      .filter((date) => date.getDay() === 0);

    sundayHolidayDates.forEach((date) => {
      const candidate = new Date(date);
      do {
        candidate.setDate(candidate.getDate() + 1);
      } while (holidays[dateToKey(candidate)]);
      holidays[dateToKey(candidate)] = "振替休日";
    });
  }

  /**
   * 指定年の日本の祝日一覧を計算する（振替休日・国民の休日を含む）
   * @param {number} year
   * @returns {Object<string,string>} YYYY-MM-DD -> 祝日名
   */
  function getHolidaysForYear(year) {
    if (holidaysByYearCache[year]) return holidaysByYearCache[year];

    const holidays = {};
    const add = (month, day, name) => {
      holidays[toDateKey(year, month, day)] = name;
    };

    add(1, 1, "元日");
    add(1, getNthMondayOfMonth(year, 1, 2).getDate(), "成人の日");
    add(2, 11, "建国記念の日");
    add(2, 23, "天皇誕生日");
    add(3, getEquinoxDay(year, "spring"), "春分の日");
    add(4, 29, "昭和の日");
    add(5, 3, "憲法記念日");
    add(5, 4, "みどりの日");
    add(5, 5, "こどもの日");
    add(7, getNthMondayOfMonth(year, 7, 3).getDate(), "海の日");
    add(8, 11, "山の日");
    add(9, getNthMondayOfMonth(year, 9, 3).getDate(), "敬老の日");
    add(9, getEquinoxDay(year, "autumn"), "秋分の日");
    add(10, getNthMondayOfMonth(year, 10, 2).getDate(), "スポーツの日");
    add(11, 3, "文化の日");
    add(11, 23, "勤労感謝の日");

    applyCitizensHoliday(holidays);
    applySubstituteHolidays(holidays);

    holidaysByYearCache[year] = holidays;
    return holidays;
  }

  /**
   * 指定日が日本の祝日であれば祝日名を返す
   * @param {Date} date
   * @returns {string|null}
   */
  function getHolidayName(date) {
    const holidays = getHolidaysForYear(date.getFullYear());
    return holidays[dateToKey(date)] || null;
  }

  /**
   * 現在の表示単位(currentPeriod)に応じて、そのヘッダーセルにラベルを表示するか判定する
   * @param {Date} cellDate
   * @param {number} index - 表示範囲の先頭からの日数(0始まり)
   * @returns {boolean}
   */
  function shouldShowDateLabel(cellDate, index) {
    if (currentPeriod === "day") {
      return true;
    }
    if (currentPeriod === "week") {
      return index === 0 || cellDate.getDay() === 1; // 月曜日
    }
    // month / quarter
    return index === 0 || cellDate.getDate() === 1;
  }

  /**
   * 選択中プロジェクトのガントチャートを描画し直す
   * 表示範囲は、全スケジュール項目の最も早い開始日〜最も遅い終了日に「今日」も含めた範囲を1日単位で並べたもの
   * @returns {Promise<void>}
   */
  async function renderGanttChart() {
    const container = document.getElementById("gantt-chart-container");

    if (currentProjectId === null) {
      container.innerHTML = "";
      return;
    }

    const items = await getScheduleItemsByProject(currentProjectId);
    const milestones = await getMilestonesByProject(currentProjectId);

    if (items.length === 0) {
      container.innerHTML = "<p>スケジュール項目がありません</p>";
      return;
    }

    const dayWidthPx = PERIOD_DAY_WIDTH_PX[currentPeriod];
    const today = getToday();
    const twoYearsAhead = new Date(today);
    twoYearsAhead.setFullYear(twoYearsAhead.getFullYear() + 2);

    const startDates = items.map((item) => parseDateStr(item.startDate));
    const endDates = items.map((item) => parseDateStr(item.endDate));
    const milestoneDates = milestones.map((milestone) => parseDateStr(milestone.date));
    const rangeStart = new Date(Math.min.apply(null, startDates.concat([today])));
    const rangeEnd = new Date(Math.max.apply(null, endDates.concat([today, twoYearsAhead]).concat(milestoneDates)));
    const totalDays = diffInDays(rangeStart, rangeEnd) + 1;
    const totalWidth = totalDays * dayWidthPx;
    const headerHeightPx = 20;
    const rowHeightPx = 28;

    const visibleList = buildVisibleScheduleList(items);
    const totalHeight = headerHeightPx + visibleList.length * rowHeightPx;

    const headerCells = [];
    const gridLines = [];
    const dayBackgrounds = [];
    for (let i = 0; i < totalDays; i++) {
      const cellDate = new Date(rangeStart);
      cellDate.setDate(cellDate.getDate() + i);
      const showLabel = shouldShowDateLabel(cellDate, i);
      const holidayName = getHolidayName(cellDate);
      const dayOfWeek = cellDate.getDay();
      const isSundayOrHoliday = dayOfWeek === 0 || holidayName !== null;
      const isSaturday = dayOfWeek === 6 && !isSundayOrHoliday;

      let headerCellClass = "";
      if (isSundayOrHoliday) {
        headerCellClass = " is-sunday-holiday";
      } else if (isSaturday) {
        headerCellClass = " is-saturday";
      }
      const titleAttr = holidayName ? " title=\"" + escapeHtml(holidayName) + "\"" : "";

      headerCells.push(
        "<div class=\"gantt-header-cell" + headerCellClass + "\" style=\"width:" + dayWidthPx + "px\"" + titleAttr + ">" +
        (showLabel ? formatDateLabel(cellDate) : "") +
        "</div>"
      );
      if (showLabel) {
        gridLines.push(
          "<div class=\"grid-line\" style=\"left:" + (i * dayWidthPx) + "px; height:" + totalHeight + "px\"></div>"
        );
      }
      if (isSundayOrHoliday || isSaturday) {
        const dayBgClass = isSundayOrHoliday ? "day-bg-sunday-holiday" : "day-bg-saturday";
        dayBackgrounds.push(
          "<div class=\"day-bg " + dayBgClass + "\" style=\"left:" + (i * dayWidthPx) + "px; width:" + dayWidthPx + "px; height:" + totalHeight + "px\"></div>"
        );
      }
    }

    const rows = visibleList
      .map((entry) => {
        const item = entry.item;
        const itemStart = parseDateStr(item.startDate);
        const itemEnd = parseDateStr(item.endDate);
        const left = diffInDays(rangeStart, itemStart) * dayWidthPx;
        const width = (diffInDays(itemStart, itemEnd) + 1) * dayWidthPx;
        return (
          "<div class=\"gantt-row\" style=\"width:" + totalWidth + "px\">" +
          "<div class=\"gantt-bar\" style=\"left:" + left + "px; width:" + width + "px\">" +
          escapeHtml(item.title) +
          "</div>" +
          "</div>"
        );
      })
      .join("");

    const todayLeft = diffInDays(rangeStart, today) * dayWidthPx;
    const todayLine =
      "<div class=\"today-line\" style=\"left:" + todayLeft + "px; height:" + totalHeight + "px\"></div>";

    const milestoneMarkers = milestones
      .map((milestone) => {
        const left = diffInDays(rangeStart, parseDateStr(milestone.date)) * dayWidthPx;
        return (
          "<div class=\"milestone-line\" style=\"left:" + left + "px; height:" + totalHeight + "px\"></div>" +
          "<div class=\"milestone-marker\" style=\"left:" + left + "px\" title=\"" + escapeHtml(milestone.label) + "\"></div>"
        );
      })
      .join("");

    container.innerHTML =
      "<div class=\"gantt-scroll\">" +
      "<div class=\"gantt-header\" style=\"width:" + totalWidth + "px\">" + headerCells.join("") + "</div>" +
      dayBackgrounds.join("") +
      gridLines.join("") +
      rows +
      todayLine +
      milestoneMarkers +
      "</div>";
  }

  /**
   * ガントチャートを、今日の日付が中央に来るようスクロールする
   */
  function scrollGanttToToday() {
    const container = document.getElementById("gantt-chart-container");
    const todayLine = container.querySelector(".today-line");
    if (!todayLine) return;

    const todayLeft = parseInt(todayLine.style.left, 10);
    container.scrollLeft = Math.max(0, todayLeft - container.clientWidth / 2);
  }

      }
    });

    document.getElementById("period-select").addEventListener("change", async (event) => {
      currentPeriod = event.target.value;
      await renderGanttChart();
    });

    document.getElementById("col-toggle-start").addEventListener("change", async (event) => {
      visibleColumns.startDate = event.target.checked;
      await renderScheduleTable();
    });

    document.getElementById("col-toggle-end").addEventListener("change", async (event) => {
      visibleColumns.endDate = event.target.checked;
      await renderScheduleTable();
    });

    document.getElementById("col-toggle-status").addEventListener("change", async (event) => {
      visibleColumns.status = event.target.checked;
      await renderScheduleTable();
    });

    document.getElementById("btn-today").addEventListener("click", async () => {
      await renderGanttChart();
      scrollGanttToToday();
    });
  }
})();
</script>
</body>
</html>
