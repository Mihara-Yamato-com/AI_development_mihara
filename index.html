<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>GantForge</title>
<style>
/* ==== Section: Base Layout ==== */
:root {
  font-family: -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", sans-serif;
}

body {
  margin: 0;
  padding: 0;
}

.app-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: #1f2937;
  color: #fff;
}

.app-header select,
.app-header button {
  font-size: 14px;
  padding: 4px 8px;
}

/* ==== Section: Toolbar ==== */
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  background: #f3f4f6;
  border-bottom: 1px solid #d1d5db;
}

.toolbar button {
  font-size: 14px;
  padding: 4px 8px;
}

/* ==== Section: Main Area / Schedule Table ==== */
.main-area {
  display: flex;
}

.schedule-table {
  flex: 1;
  padding: 12px;
}

.schedule-table table {
  border-collapse: collapse;
  width: 100%;
}

.schedule-table th,
.schedule-table td {
  border: 1px solid #d1d5db;
  padding: 4px 8px;
  font-size: 13px;
  text-align: left;
}

.toggle-arrow {
  display: inline-block;
  width: 14px;
  cursor: pointer;
  user-select: none;
}

.toggle-spacer {
  display: inline-block;
  width: 14px;
}

.schedule-table .status-select {
  font-size: 12px;
  padding: 2px;
}

.schedule-table .row-actions {
  white-space: nowrap;
}

.schedule-table .row-actions button {
  visibility: hidden;
  font-size: 11px;
  padding: 2px 4px;
  margin-right: 2px;
}

.schedule-table tr.schedule-row:hover .row-actions button {
  visibility: visible;
}

.gantt-chart {
  flex: 1;
  padding: 12px;
  color: #6b7280;
  font-size: 13px;
  overflow-x: auto;
}

/* ==== Section: Gantt Chart Rendering ==== */
.gantt-scroll {
  position: relative;
  display: inline-block;
}

.gantt-header {
  display: flex;
  height: 20px;
  border-bottom: 1px solid #d1d5db;
}

.gantt-header-cell {
  flex: 0 0 auto;
  font-size: 11px;
  text-align: center;
  border-right: 1px solid #e5e7eb;
  padding: 2px 0;
  box-sizing: border-box;
  overflow: hidden;
}

.gantt-header-cell.is-saturday {
  background: #dbeafe;
  color: #1d4ed8;
}

.gantt-header-cell.is-sunday-holiday {
  background: #fee2e2;
  color: #b91c1c;
}

.day-bg {
  position: absolute;
  top: 0;
  pointer-events: none;
}

.day-bg-saturday {
  background: rgba(59, 130, 246, 0.08);
}

.day-bg-sunday-holiday {
  background: rgba(239, 68, 68, 0.08);
}

.gantt-row {
  position: relative;
  height: 28px;
  border-bottom: 1px solid #f3f4f6;
}

.gantt-bar {
  position: absolute;
  top: 4px;
  height: 20px;
  background: #3b82f6;
  color: #fff;
  font-size: 12px;
  border-radius: 3px;
  padding: 0 4px;
  white-space: nowrap;
  overflow: hidden;
  box-sizing: border-box;
}

.today-line {
  position: absolute;
  top: 0;
  width: 2px;
  background: #ef4444;
  pointer-events: none;
}

.grid-line {
  position: absolute;
  top: 0;
  width: 1px;
  background: #e5e7eb;
  pointer-events: none;
}

.milestone-line {
  position: absolute;
  top: 0;
  width: 2px;
  background: #a855f7;
  pointer-events: none;
}

.milestone-label {
  position: absolute;
  top: 0;
  font-size: 10px;
  color: #a855f7;
  white-space: nowrap;
  transform: translateX(2px);
}

/* ==== Section: Modal ==== */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-overlay[hidden] {
  display: none;
}

.modal-box {
  background: #fff;
  padding: 16px 20px;
  border-radius: 6px;
  width: 360px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.modal-box h2 {
  margin: 0 0 8px;
  font-size: 16px;
}

.modal-box input,
.modal-box textarea {
  font-size: 14px;
  padding: 4px 6px;
  box-sizing: border-box;
  width: 100%;
}

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 8px;
}

.milestone-list-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
  padding: 2px 0;
  border-bottom: 1px solid #f3f4f6;
}

.milestone-list-item button {
  font-size: 12px;
}

/* ==== Section: Lock ==== */
button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.modal-box input:disabled,
.modal-box textarea:disabled {
  background: #e5e7eb;
  cursor: not-allowed;
}

#btn-toggle-lock.is-locked {
  background: #b91c1c;
  color: #fff;
}
</style>
</head>
<body>
<header class="app-header">
  <label for="project-select">プロジェクト:</label>
  <select id="project-select"></select>
  <button id="btn-new-project">新規プロジェクト作成</button>
  <button id="btn-delete-project">プロジェクト削除</button>
  <button id="btn-edit-project">編集</button>
  <button id="btn-milestones">マイルストーン</button>
  <button id="btn-toggle-lock">ロック</button>
</header>

<div class="toolbar">
  <button id="btn-add-schedule">スケジュール追加</button>
  <label for="period-select">表示単位:</label>
  <select id="period-select">
    <option value="day">日</option>
    <option value="week">週</option>
    <option value="month">月</option>
    <option value="quarter">3ヶ月</option>
  </select>
  <button id="btn-today">今日</button>
  <button id="btn-expand-all">全て開く</button>
  <span>表示列:</span>
  <label><input type="checkbox" id="col-toggle-start" checked>開始</label>
  <label><input type="checkbox" id="col-toggle-end" checked>終了</label>
  <label><input type="checkbox" id="col-toggle-status" checked>状態</label>
</div>

<main class="main-area">
  <section id="schedule-table-container" class="schedule-table"></section>
  <section id="gantt-chart-container" class="gantt-chart"></section>
</main>

<div id="project-edit-modal" class="modal-overlay" hidden>
  <div class="modal-box">
    <h2>プロジェクト概要編集</h2>
    <label for="edit-project-name">プロジェクト名</label>
    <input id="edit-project-name" type="text">
    <label for="edit-project-description">説明</label>
    <textarea id="edit-project-description" rows="4"></textarea>
    <div class="modal-actions">
      <button id="btn-cancel-edit-project">キャンセル</button>
      <button id="btn-save-edit-project">保存</button>
    </div>
  </div>
</div>

<div id="schedule-add-modal" class="modal-overlay" hidden>
  <div class="modal-box">
    <h2>スケジュール追加</h2>
    <label for="schedule-add-title">作業内容</label>
    <input id="schedule-add-title" type="text">
    <label for="schedule-add-start-date">開始日</label>
    <input id="schedule-add-start-date" type="date">
    <label for="schedule-add-end-date">終了日</label>
    <input id="schedule-add-end-date" type="date">
    <label for="schedule-add-parent">親項目</label>
    <select id="schedule-add-parent"></select>
    <div class="modal-actions">
      <button id="btn-cancel-add-schedule">キャンセル</button>
      <button id="btn-confirm-add-schedule">追加</button>
    </div>
  </div>
</div>

<div id="milestone-modal" class="modal-overlay" hidden>
  <div class="modal-box">
    <h2>マイルストーン設定</h2>
    <div id="milestone-list"></div>
    <label for="milestone-date">日付</label>
    <input id="milestone-date" type="date">
    <label for="milestone-label">ラベル</label>
    <input id="milestone-label" type="text">
    <div class="modal-actions">
      <button id="btn-close-milestone-modal">閉じる</button>
      <button id="btn-add-milestone">追加</button>
    </div>
  </div>
</div>

<div id="schedule-edit-modal" class="modal-overlay" hidden>
  <div class="modal-box">
    <h2>スケジュール編集</h2>
    <label for="schedule-edit-title">作業内容</label>
    <input id="schedule-edit-title" type="text">
    <label for="schedule-edit-start-date">開始日</label>
    <input id="schedule-edit-start-date" type="date">
    <label for="schedule-edit-end-date">終了日</label>
    <input id="schedule-edit-end-date" type="date">
    <div class="modal-actions">
      <button id="btn-cancel-edit-schedule">キャンセル</button>
      <button id="btn-save-edit-schedule">保存</button>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  /* ==== Section: 初期化 ==== */
  const DB_NAME = "GantForgeDB";
  const DB_VERSION = 3;
  const STORE_PROJECTS = "projects";
  const STORE_SCHEDULE_ITEMS = "scheduleItems";
  const INDEX_SCHEDULE_ITEMS_BY_PROJECT = "by_projectId";
  const STORE_MILESTONES = "milestones";
  const INDEX_MILESTONES_BY_PROJECT = "by_projectId";

  const STATUS_NOT_STARTED = "未着手";
  const STATUS_IN_PROGRESS = "進行中";
  const STATUS_DONE = "完了";
  const STATUS_OPTIONS = [STATUS_NOT_STARTED, STATUS_IN_PROGRESS, STATUS_DONE];

  const PERIOD_DAY_WIDTH_PX = {
    day: 24,
    week: 10,
    month: 5,
    quarter: 3,
  };

  let db = null;
  let currentProjectId = null;
  let currentPeriod = "day";
  let currentProjectLocked = false;
  let visibleColumns = { startDate: true, endDate: true, status: true };
  let editingScheduleItemId = null;

  document.addEventListener("DOMContentLoaded", init);

  async function init() {
    db = await openDatabase();
    await refreshProjectSelect();
    await renderMainArea();
    bindEvents();
  }

  /**
   * スケジュール表とガントチャートをまとめて再描画する
   * @returns {Promise<void>}
   */
  async function renderMainArea() {
    await renderScheduleTable();
    await renderGanttChart();
  }

  /* ==== Section: データ層(IndexedDB) ==== */

  /**
   * IndexedDBを開き、初回はオブジェクトストアを作成する
   * @returns {Promise<IDBDatabase>}
   */
  function openDatabase() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, DB_VERSION);

      request.onupgradeneeded = (event) => {
        const database = event.target.result;

        if (!database.objectStoreNames.contains(STORE_PROJECTS)) {
          database.createObjectStore(STORE_PROJECTS, {
            keyPath: "id",
            autoIncrement: true,
          });
        }

        if (!database.objectStoreNames.contains(STORE_SCHEDULE_ITEMS)) {
          const scheduleStore = database.createObjectStore(STORE_SCHEDULE_ITEMS, {
            keyPath: "id",
            autoIncrement: true,
          });
          scheduleStore.createIndex(INDEX_SCHEDULE_ITEMS_BY_PROJECT, "projectId", {
            unique: false,
          });
        }

        if (!database.objectStoreNames.contains(STORE_MILESTONES)) {
          const milestoneStore = database.createObjectStore(STORE_MILESTONES, {
            keyPath: "id",
            autoIncrement: true,
          });
          milestoneStore.createIndex(INDEX_MILESTONES_BY_PROJECT, "projectId", {
            unique: false,
          });
        }
      };

      request.onsuccess = (event) => resolve(event.target.result);
      request.onerror = (event) => reject(event.target.error);
    });
  }

  /* ---- Sub-section: Projects ---- */

  /**
   * プロジェクトを新規追加する
   * @param {string} name - プロジェクト名
   * @returns {Promise<number>} 追加されたプロジェクトのid
   */
  function addProject(name) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_PROJECTS, "readwrite");
      const store = tx.objectStore(STORE_PROJECTS);
      const now = Date.now();
      const request = store.add({
        name: name,
        description: "",
        createdAt: now,
        updatedAt: now,
        locked: false,
      });
      request.onsuccess = (event) => resolve(event.target.result);
      request.onerror = (event) => reject(event.target.error);
    });
  }

  /**
   * 全プロジェクトを取得する
   * @returns {Promise<Array<Object>>}
   */
  function getAllProjects() {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_PROJECTS, "readonly");
      const store = tx.objectStore(STORE_PROJECTS);
      const request = store.getAll();
      request.onsuccess = (event) => resolve(event.target.result);
      request.onerror = (event) => reject(event.target.error);
    });
  }

  /**
   * プロジェクトを削除する
   * @param {number} id - 削除対象のプロジェクトid
   * @returns {Promise<void>}
   */
  function deleteProject(id) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_PROJECTS, "readwrite");
      const store = tx.objectStore(STORE_PROJECTS);
      const request = store.delete(id);
      request.onsuccess = () => resolve();
      request.onerror = (event) => reject(event.target.error);
    });
  }

  /**
   * idを指定してプロジェクトを1件取得する
   * @param {number} id
   * @returns {Promise<Object|undefined>}
   */
  function getProjectById(id) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_PROJECTS, "readonly");
      const store = tx.objectStore(STORE_PROJECTS);
      const request = store.get(id);
      request.onsuccess = (event) => resolve(event.target.result);
      request.onerror = (event) => reject(event.target.error);
    });
  }

  /**
   * プロジェクトの名前・説明を更新する
   * @param {number} id
   * @param {Object} changes
   * @param {string} changes.name
   * @param {string} changes.description
   * @returns {Promise<void>}
   */
  function updateProject(id, changes) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_PROJECTS, "readwrite");
      const store = tx.objectStore(STORE_PROJECTS);
      const getRequest = store.get(id);

      getRequest.onsuccess = () => {
        const project = getRequest.result;
        project.name = changes.name;
        project.description = changes.description;
        project.updatedAt = Date.now();
        const putRequest = store.put(project);
        putRequest.onsuccess = () => resolve();
        putRequest.onerror = (event) => reject(event.target.error);
      };
      getRequest.onerror = (event) => reject(event.target.error);
    });
  }

  /**
   * プロジェクトのロック状態を更新する
   * @param {number} id
   * @param {boolean} locked
   * @returns {Promise<void>}
   */
  function setProjectLocked(id, locked) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_PROJECTS, "readwrite");
      const store = tx.objectStore(STORE_PROJECTS);
      const getRequest = store.get(id);

      getRequest.onsuccess = () => {
        const project = getRequest.result;
        project.locked = locked;
        const putRequest = store.put(project);
        putRequest.onsuccess = () => resolve();
        putRequest.onerror = (event) => reject(event.target.error);
      };
      getRequest.onerror = (event) => reject(event.target.error);
    });
  }

  /* ---- Sub-section: Schedule Items ---- */

  /**
   * スケジュール項目を新規追加する
   * @param {Object} item
   * @param {number} item.projectId - 紐づくプロジェクトのid
   * @param {string} item.title - 作業内容
   * @param {string} item.startDate - 開始日(YYYY-MM-DD)
   * @param {string} item.endDate - 終了日(YYYY-MM-DD)
   * @param {number|null} [item.parentId] - 親項目のid(トップレベルはnull)
   * @returns {Promise<number>} 追加されたスケジュール項目のid
   */
  function addScheduleItem(item) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_SCHEDULE_ITEMS, "readwrite");
      const store = tx.objectStore(STORE_SCHEDULE_ITEMS);
      const request = store.add({
        projectId: item.projectId,
        title: item.title,
        startDate: item.startDate,
        endDate: item.endDate,
        status: STATUS_NOT_STARTED,
        order: Date.now(),
        parentId: item.parentId || null,
        collapsed: false,
      });
      request.onsuccess = (event) => resolve(event.target.result);
      request.onerror = (event) => reject(event.target.error);
    });
  }

  /**
   * idを指定してスケジュール項目を1件取得する
   * @param {number} id
   * @returns {Promise<Object>}
   */
  function getScheduleItemById(id) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_SCHEDULE_ITEMS, "readonly");
      const store = tx.objectStore(STORE_SCHEDULE_ITEMS);
      const request = store.get(id);
      request.onsuccess = (event) => resolve(event.target.result);
      request.onerror = (event) => reject(event.target.error);
    });
  }

  /**
   * スケジュール項目の内容を更新する
   * @param {number} id
   * @param {Object} changes - title/startDate/endDate/statusのうち更新したい項目
   * @returns {Promise<void>}
   */
  function updateScheduleItem(id, changes) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_SCHEDULE_ITEMS, "readwrite");
      const store = tx.objectStore(STORE_SCHEDULE_ITEMS);
      const getRequest = store.get(id);

      getRequest.onsuccess = () => {
        const item = getRequest.result;
        Object.assign(item, changes);
        const putRequest = store.put(item);
        putRequest.onsuccess = () => resolve();
        putRequest.onerror = (event) => reject(event.target.error);
      };
      getRequest.onerror = (event) => reject(event.target.error);
    });
  }

  /**
   * スケジュール項目を削除する
   * @param {number} id
   * @returns {Promise<void>}
   */
  function deleteScheduleItem(id) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_SCHEDULE_ITEMS, "readwrite");
      const store = tx.objectStore(STORE_SCHEDULE_ITEMS);
      const request = store.delete(id);
      request.onsuccess = () => resolve();
      request.onerror = (event) => reject(event.target.error);
    });
  }

  /**
   * 2つのスケジュール項目の表示順(order)を入れ替える
   * @param {Object} itemA
   * @param {Object} itemB
   * @returns {Promise<void>}
   */
  function swapScheduleItemOrder(itemA, itemB) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_SCHEDULE_ITEMS, "readwrite");
      const store = tx.objectStore(STORE_SCHEDULE_ITEMS);
      const orderA = itemA.order;
      const orderB = itemB.order;
      itemA.order = orderB;
      itemB.order = orderA;
      store.put(itemA);
      store.put(itemB);
      tx.oncomplete = () => resolve();
      tx.onerror = (event) => reject(event.target.error);
    });
  }

  /**
   * 指定プロジェクトのスケジュール項目を、登録順に取得する
   * @param {number} projectId
   * @returns {Promise<Array<Object>>}
   */
  function getScheduleItemsByProject(projectId) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_SCHEDULE_ITEMS, "readonly");
      const store = tx.objectStore(STORE_SCHEDULE_ITEMS);
      const index = store.index(INDEX_SCHEDULE_ITEMS_BY_PROJECT);
      const request = index.getAll(IDBKeyRange.only(projectId));
      request.onsuccess = (event) => {
        const items = event.target.result;
        items.sort((a, b) => a.order - b.order);
        resolve(items);
      };
      request.onerror = (event) => reject(event.target.error);
    });
  }

  /**
   * スケジュール項目の折りたたみ状態を更新する
   * @param {number} id
   * @param {boolean} collapsed
   * @returns {Promise<void>}
   */
  function setScheduleItemCollapsed(id, collapsed) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_SCHEDULE_ITEMS, "readwrite");
      const store = tx.objectStore(STORE_SCHEDULE_ITEMS);
      const getRequest = store.get(id);

      getRequest.onsuccess = () => {
        const item = getRequest.result;
        item.collapsed = collapsed;
        const putRequest = store.put(item);
        putRequest.onsuccess = () => resolve();
        putRequest.onerror = (event) => reject(event.target.error);
      };
      getRequest.onerror = (event) => reject(event.target.error);
    });
  }

  /**
   * 指定プロジェクトの全スケジュール項目を展開状態(collapsed=false)にする
   * @param {number} projectId
   * @returns {Promise<void>}
   */
  async function expandAllScheduleItems(projectId) {
    const items = await getScheduleItemsByProject(projectId);
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_SCHEDULE_ITEMS, "readwrite");
      const store = tx.objectStore(STORE_SCHEDULE_ITEMS);
      items.forEach((item) => {
        item.collapsed = false;
        store.put(item);
      });
      tx.oncomplete = () => resolve();
      tx.onerror = (event) => reject(event.target.error);
    });
  }

  /* ---- Sub-section: Milestones ---- */

  /**
   * マイルストーンを新規追加する
   * @param {Object} milestone
   * @param {number} milestone.projectId
   * @param {string} milestone.date - 日付(YYYY-MM-DD)
   * @param {string} milestone.label
   * @returns {Promise<number>} 追加されたマイルストーンのid
   */
  function addMilestone(milestone) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_MILESTONES, "readwrite");
      const store = tx.objectStore(STORE_MILESTONES);
      const request = store.add({
        projectId: milestone.projectId,
        date: milestone.date,
        label: milestone.label,
      });
      request.onsuccess = (event) => resolve(event.target.result);
      request.onerror = (event) => reject(event.target.error);
    });
  }

  /**
   * 指定プロジェクトのマイルストーンを、日付順に取得する
   * @param {number} projectId
   * @returns {Promise<Array<Object>>}
   */
  function getMilestonesByProject(projectId) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_MILESTONES, "readonly");
      const store = tx.objectStore(STORE_MILESTONES);
      const index = store.index(INDEX_MILESTONES_BY_PROJECT);
      const request = index.getAll(IDBKeyRange.only(projectId));
      request.onsuccess = (event) => {
        const milestones = event.target.result;
        milestones.sort((a, b) => (a.date < b.date ? -1 : 1));
        resolve(milestones);
      };
      request.onerror = (event) => reject(event.target.error);
    });
  }

  /**
   * マイルストーンを削除する
   * @param {number} id
   * @returns {Promise<void>}
   */
  function deleteMilestone(id) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_MILESTONES, "readwrite");
      const store = tx.objectStore(STORE_MILESTONES);
      const request = store.delete(id);
      request.onsuccess = () => resolve();
      request.onerror = (event) => reject(event.target.error);
    });
  }

  /**
   * フラットなスケジュール項目配列から、親子関係(parentId)と折りたたみ状態(collapsed)を
   * 反映した表示順のリストを作る(深さ優先)
   * @param {Array<Object>} items
   * @param {Object} [options]
   * @param {boolean} [options.ignoreCollapsed] - trueの場合、折りたたみ状態を無視して全展開する
   * @returns {Array<{item: Object, depth: number, hasChildren: boolean}>}
   */
  function buildVisibleScheduleList(items, options) {
    const ignoreCollapsed = Boolean(options && options.ignoreCollapsed);
    const childrenByParentId = new Map();

    items.forEach((item) => {
      const parentId = item.parentId || null;
      if (!childrenByParentId.has(parentId)) {
        childrenByParentId.set(parentId, []);
      }
      childrenByParentId.get(parentId).push(item);
    });

    const result = [];

    function visit(parentId, depth) {
      const children = childrenByParentId.get(parentId) || [];
      children.forEach((item) => {
        const hasChildren = (childrenByParentId.get(item.id) || []).length > 0;
        result.push({ item: item, depth: depth, hasChildren: hasChildren });
        if (ignoreCollapsed || !item.collapsed) {
          visit(item.id, depth + 1);
        }
      });
    }

    visit(null, 0);
    return result;
  }

  /* ---- Sub-section: Gantt Chart Rendering ---- */

  /**
   * YYYY-MM-DD形式の文字列を、ローカル日付のDateに変換する
   * @param {string} dateStr
   * @returns {Date}
   */
  function parseDateStr(dateStr) {
    return new Date(dateStr + "T00:00:00");
  }

  /**
   * YYYY-MM-DD形式の、実在する日付の文字列かどうかを判定する
   * @param {string} dateStr
   * @returns {boolean}
   */
  function isValidDateStr(dateStr) {
    if (!/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
      return false;
    }
    return !isNaN(parseDateStr(dateStr).getTime());
  }

  /**
   * 2つの日付の差を日数で返す（b - a）
   * @param {Date} a
   * @param {Date} b
   * @returns {number}
   */
  function diffInDays(a, b) {
    return Math.round((b.getTime() - a.getTime()) / 86400000);
  }

  /**
   * ガントチャートのヘッダーに表示する日付ラベルを作る（例: 7/14）
   * @param {Date} date
   * @returns {string}
   */
  function formatDateLabel(date) {
    return (date.getMonth() + 1) + "/" + date.getDate();
  }

  /**
   * 今日の0時のDateを返す
   * @returns {Date}
   */
  function getToday() {
    const now = new Date();
    now.setHours(0, 0, 0, 0);
    return now;
  }

  /* ---- Sub-section: Japanese Holiday Calculation ---- */

  const holidaysByYearCache = {};

  /**
   * YYYY-MM-DD形式のキー文字列を作る
   * @param {number} year
   * @param {number} month - 1-12
   * @param {number} day
   * @returns {string}
   */
  function toDateKey(year, month, day) {
    const mm = String(month).padStart(2, "0");
    const dd = String(day).padStart(2, "0");
    return year + "-" + mm + "-" + dd;
  }

  /**
   * DateをYYYY-MM-DD形式のキー文字列に変換する
   * @param {Date} date
   * @returns {string}
   */
  function dateToKey(date) {
    return toDateKey(date.getFullYear(), date.getMonth() + 1, date.getDate());
  }

  /**
   * 指定した月の第nth月曜日のDateを返す（ハッピーマンデー祝日用）
   * @param {number} year
   * @param {number} month - 1-12
   * @param {number} nth
   * @returns {Date}
   */
  function getNthMondayOfMonth(year, month, nth) {
    const firstOfMonth = new Date(year, month - 1, 1);
    const dayOffsetToMonday = (8 - firstOfMonth.getDay()) % 7;
    const day = 1 + dayOffsetToMonday + (nth - 1) * 7;
    return new Date(year, month - 1, day);
  }

  /**
   * 春分の日・秋分の日を近似式で計算する（2000〜2099年の範囲で有効）
   * @param {number} year
   * @param {"spring"|"autumn"} season
   * @returns {number} 日(day)
   */
  function getEquinoxDay(year, season) {
    const base = season === "spring" ? 20.8431 : 23.2488;
    return Math.floor(base + 0.242194 * (year - 1980) - Math.floor((year - 1980) / 4));
  }

  /**
   * 前後を祝日に挟まれた平日を「国民の休日」として追加する
   * @param {Object<string,string>} holidays
   */
  function applyCitizensHoliday(holidays) {
    const dates = Object.keys(holidays)
      .map((key) => parseDateStr(key))
      .sort((a, b) => a.getTime() - b.getTime());

    for (let i = 0; i < dates.length - 1; i++) {
      if (diffInDays(dates[i], dates[i + 1]) !== 2) continue;
      const between = new Date(dates[i]);
      between.setDate(between.getDate() + 1);
      const key = dateToKey(between);
      if (!holidays[key] && between.getDay() !== 0) {
        holidays[key] = "国民の休日";
      }
    }
  }

  /**
   * 日曜日と重なる祝日に振替休日を追加する
   * @param {Object<string,string>} holidays
   */
  function applySubstituteHolidays(holidays) {
    const sundayHolidayDates = Object.keys(holidays)
      .map((key) => parseDateStr(key))
      .filter((date) => date.getDay() === 0);

    sundayHolidayDates.forEach((date) => {
      const candidate = new Date(date);
      do {
        candidate.setDate(candidate.getDate() + 1);
      } while (holidays[dateToKey(candidate)]);
      holidays[dateToKey(candidate)] = "振替休日";
    });
  }

  /**
   * 指定年の日本の祝日一覧を計算する（振替休日・国民の休日を含む）
   * @param {number} year
   * @returns {Object<string,string>} YYYY-MM-DD -> 祝日名
   */
  function getHolidaysForYear(year) {
    if (holidaysByYearCache[year]) return holidaysByYearCache[year];

    const holidays = {};
    const add = (month, day, name) => {
      holidays[toDateKey(year, month, day)] = name;
    };

    add(1, 1, "元日");
    add(1, getNthMondayOfMonth(year, 1, 2).getDate(), "成人の日");
    add(2, 11, "建国記念の日");
    add(2, 23, "天皇誕生日");
    add(3, getEquinoxDay(year, "spring"), "春分の日");
    add(4, 29, "昭和の日");
    add(5, 3, "憲法記念日");
    add(5, 4, "みどりの日");
    add(5, 5, "こどもの日");
    add(7, getNthMondayOfMonth(year, 7, 3).getDate(), "海の日");
    add(8, 11, "山の日");
    add(9, getNthMondayOfMonth(year, 9, 3).getDate(), "敬老の日");
    add(9, getEquinoxDay(year, "autumn"), "秋分の日");
    add(10, getNthMondayOfMonth(year, 10, 2).getDate(), "スポーツの日");
    add(11, 3, "文化の日");
    add(11, 23, "勤労感謝の日");

    applyCitizensHoliday(holidays);
    applySubstituteHolidays(holidays);

    holidaysByYearCache[year] = holidays;
    return holidays;
  }

  /**
   * 指定日が日本の祝日であれば祝日名を返す
   * @param {Date} date
   * @returns {string|null}
   */
  function getHolidayName(date) {
    const holidays = getHolidaysForYear(date.getFullYear());
    return holidays[dateToKey(date)] || null;
  }

  /**
   * 現在の表示単位(currentPeriod)に応じて、そのヘッダーセルにラベルを表示するか判定する
   * @param {Date} cellDate
   * @param {number} index - 表示範囲の先頭からの日数(0始まり)
   * @returns {boolean}
   */
  function shouldShowDateLabel(cellDate, index) {
    if (currentPeriod === "day") {
      return true;
    }
    if (currentPeriod === "week") {
      return index === 0 || cellDate.getDay() === 1; // 月曜日
    }
    // month / quarter
    return index === 0 || cellDate.getDate() === 1;
  }

  /**
   * 選択中プロジェクトのガントチャートを描画し直す
   * 表示範囲は、全スケジュール項目の最も早い開始日〜最も遅い終了日に「今日」も含めた範囲を1日単位で並べたもの
   * @returns {Promise<void>}
   */
  async function renderGanttChart() {
    const container = document.getElementById("gantt-chart-container");

    if (currentProjectId === null) {
      container.innerHTML = "";
      return;
    }

    const items = await getScheduleItemsByProject(currentProjectId);
    const milestones = await getMilestonesByProject(currentProjectId);

    if (items.length === 0) {
      container.innerHTML = "<p>スケジュール項目がありません</p>";
      return;
    }

    const dayWidthPx = PERIOD_DAY_WIDTH_PX[currentPeriod];
    const today = getToday();
    const twoYearsAhead = new Date(today);
    twoYearsAhead.setFullYear(twoYearsAhead.getFullYear() + 2);

    const startDates = items.map((item) => parseDateStr(item.startDate));
    const endDates = items.map((item) => parseDateStr(item.endDate));
    const milestoneDates = milestones.map((milestone) => parseDateStr(milestone.date));
    const rangeStart = new Date(Math.min.apply(null, startDates.concat([today])));
    const rangeEnd = new Date(Math.max.apply(null, endDates.concat([today, twoYearsAhead]).concat(milestoneDates)));
    const totalDays = diffInDays(rangeStart, rangeEnd) + 1;
    const totalWidth = totalDays * dayWidthPx;
    const headerHeightPx = 20;
    const rowHeightPx = 28;

    const visibleList = buildVisibleScheduleList(items);
    const totalHeight = headerHeightPx + visibleList.length * rowHeightPx;

    const headerCells = [];
    const gridLines = [];
    const dayBackgrounds = [];
    for (let i = 0; i < totalDays; i++) {
      const cellDate = new Date(rangeStart);
      cellDate.setDate(cellDate.getDate() + i);
      const showLabel = shouldShowDateLabel(cellDate, i);
      const holidayName = getHolidayName(cellDate);
      const dayOfWeek = cellDate.getDay();
      const isSundayOrHoliday = dayOfWeek === 0 || holidayName !== null;
      const isSaturday = dayOfWeek === 6 && !isSundayOrHoliday;

      let headerCellClass = "";
      if (isSundayOrHoliday) {
        headerCellClass = " is-sunday-holiday";
      } else if (isSaturday) {
        headerCellClass = " is-saturday";
      }
      const titleAttr = holidayName ? " title=\"" + escapeHtml(holidayName) + "\"" : "";

      headerCells.push(
        "<div class=\"gantt-header-cell" + headerCellClass + "\" style=\"width:" + dayWidthPx + "px\"" + titleAttr + ">" +
        (showLabel ? formatDateLabel(cellDate) : "") +
        "</div>"
      );
      if (showLabel) {
        gridLines.push(
          "<div class=\"grid-line\" style=\"left:" + (i * dayWidthPx) + "px; height:" + totalHeight + "px\"></div>"
        );
      }
      if (isSundayOrHoliday || isSaturday) {
        const dayBgClass = isSundayOrHoliday ? "day-bg-sunday-holiday" : "day-bg-saturday";
        dayBackgrounds.push(
          "<div class=\"day-bg " + dayBgClass + "\" style=\"left:" + (i * dayWidthPx) + "px; width:" + dayWidthPx + "px; height:" + totalHeight + "px\"></div>"
        );
      }
    }

    const rows = visibleList
      .map((entry) => {
        const item = entry.item;
        const itemStart = parseDateStr(item.startDate);
        const itemEnd = parseDateStr(item.endDate);
        const left = diffInDays(rangeStart, itemStart) * dayWidthPx;
        const width = (diffInDays(itemStart, itemEnd) + 1) * dayWidthPx;
        return (
          "<div class=\"gantt-row\" style=\"width:" + totalWidth + "px\">" +
          "<div class=\"gantt-bar\" style=\"left:" + left + "px; width:" + width + "px\">" +
          escapeHtml(item.title) +
          "</div>" +
          "</div>"
        );
      })
      .join("");

    const todayLeft = diffInDays(rangeStart, today) * dayWidthPx;
    const todayLine =
      "<div class=\"today-line\" style=\"left:" + todayLeft + "px; height:" + totalHeight + "px\"></div>";

    const milestoneMarkers = milestones
      .map((milestone) => {
        const left = diffInDays(rangeStart, parseDateStr(milestone.date)) * dayWidthPx;
        return (
          "<div class=\"milestone-line\" style=\"left:" + left + "px; height:" + totalHeight + "px\"></div>" +
          "<div class=\"milestone-label\" style=\"left:" + left + "px\">" + escapeHtml(milestone.label) + "</div>"
        );
      })
      .join("");

    container.innerHTML =
      "<div class=\"gantt-scroll\">" +
      "<div class=\"gantt-header\" style=\"width:" + totalWidth + "px\">" + headerCells.join("") + "</div>" +
      dayBackgrounds.join("") +
      gridLines.join("") +
      rows +
      todayLine +
      milestoneMarkers +
      "</div>";
  }

  /**
   * ガントチャートを、今日の日付が中央に来るようスクロールする
   */
  function scrollGanttToToday() {
    const container = document.getElementById("gantt-chart-container");
    const todayLine = container.querySelector(".today-line");
    if (!todayLine) return;

    const todayLeft = parseInt(todayLine.style.left, 10);
    container.scrollLeft = Math.max(0, todayLeft - container.clientWidth / 2);
  }

  /* ==== Section: イベントハンドラ ==== */

  function bindEvents() {
    document.getElementById("project-select").addEventListener("change", async (event) => {
      currentProjectId = event.target.value ? Number(event.target.value) : null;
      const project = currentProjectId === null ? null : await getProjectById(currentProjectId);
      currentProjectLocked = Boolean(project && project.locked);
      renderLockUI();
      await renderMainArea();
    });

    document.getElementById("btn-toggle-lock").addEventListener("click", async () => {
      if (currentProjectId === null) return;
      const nextLocked = !currentProjectLocked;
      await setProjectLocked(currentProjectId, nextLocked);
      currentProjectLocked = nextLocked;
      renderLockUI();
    });

    document.getElementById("btn-new-project").addEventListener("click", async () => {
      const name = window.prompt("プロジェクト名を入力してください");
      if (!name) return;
      const newId = await addProject(name);
      currentProjectId = newId;
      await refreshProjectSelect();
      await renderMainArea();
    });

    document.getElementById("btn-edit-project").addEventListener("click", async () => {
      await openProjectEditModal();
    });

    document.getElementById("btn-cancel-edit-project").addEventListener("click", () => {
      closeProjectEditModal();
    });

    document.getElementById("btn-save-edit-project").addEventListener("click", async () => {
      if (currentProjectLocked) return;
      const name = document.getElementById("edit-project-name").value.trim();
      const description = document.getElementById("edit-project-description").value;
      if (!name) {
        window.alert("プロジェクト名を入力してください");
        return;
      }
      await updateProject(currentProjectId, { name: name, description: description });
      closeProjectEditModal();
      await refreshProjectSelect();
    });

    document.getElementById("btn-delete-project").addEventListener("click", async () => {
      if (currentProjectId === null || currentProjectLocked) return;
      const ok = window.confirm("選択中のプロジェクトを削除しますか？");
      if (!ok) return;
      await deleteProject(currentProjectId);
      currentProjectId = null;
      await refreshProjectSelect();
      await renderMainArea();
    });

    document.getElementById("btn-add-schedule").addEventListener("click", async () => {
      await openScheduleAddModal();
    });

    document.getElementById("btn-cancel-add-schedule").addEventListener("click", () => {
      closeScheduleAddModal();
    });

    document.getElementById("btn-confirm-add-schedule").addEventListener("click", async () => {
      if (currentProjectLocked) return;
      const title = document.getElementById("schedule-add-title").value.trim();
      const startDate = document.getElementById("schedule-add-start-date").value;
      const endDate = document.getElementById("schedule-add-end-date").value;
      const parentIdValue = document.getElementById("schedule-add-parent").value;

      if (!title) {
        window.alert("作業内容を入力してください");
        return;
      }
      if (!isValidDateStr(startDate)) {
        window.alert("開始日を選択してください");
        return;
      }
      if (!isValidDateStr(endDate)) {
        window.alert("終了日を選択してください");
        return;
      }

      await addScheduleItem({
        projectId: currentProjectId,
        title: title,
        startDate: startDate,
        endDate: endDate,
        parentId: parentIdValue ? Number(parentIdValue) : null,
      });
      closeScheduleAddModal();
      await renderMainArea();
    });

    document.getElementById("schedule-table-container").addEventListener("click", async (event) => {
      const toggle = event.target.closest(".toggle-arrow");
      if (!toggle) return;

      const id = Number(toggle.dataset.toggleId);
      const items = await getScheduleItemsByProject(currentProjectId);
      const item = items.find((i) => i.id === id);
      await setScheduleItemCollapsed(id, !item.collapsed);
      await renderMainArea();
    });

    document.getElementById("schedule-table-container").addEventListener("change", async (event) => {
      if (!event.target.classList.contains("status-select")) return;
      if (currentProjectLocked) return;
      const itemId = Number(event.target.dataset.itemId);
      await updateScheduleItem(itemId, { status: event.target.value });
    });

    document.getElementById("schedule-table-container").addEventListener("click", async (event) => {
      const button = event.target.closest("button");
      if (!button || !button.dataset.itemId) return;
      if (currentProjectLocked) return;
      const itemId = Number(button.dataset.itemId);

      if (button.classList.contains("btn-row-edit")) {
        const item = await getScheduleItemById(itemId);
        openScheduleEditModal(item);
        return;
      }

      if (button.classList.contains("btn-row-delete")) {
        const ok = window.confirm("このスケジュール項目を削除しますか？");
        if (!ok) return;
        await deleteScheduleItem(itemId);
        await renderMainArea();
        return;
      }

      if (button.classList.contains("btn-row-move-up") || button.classList.contains("btn-row-move-down")) {
        const items = await getScheduleItemsByProject(currentProjectId);
        const item = items.find((i) => i.id === itemId);
        const siblings = items.filter((i) => (i.parentId || null) === (item.parentId || null));
        const index = siblings.findIndex((i) => i.id === itemId);
        const targetIndex = button.classList.contains("btn-row-move-up") ? index - 1 : index + 1;
        if (targetIndex < 0 || targetIndex >= siblings.length) return;
        await swapScheduleItemOrder(siblings[index], siblings[targetIndex]);
        await renderMainArea();
        return;
      }
    });

    document.getElementById("btn-cancel-edit-schedule").addEventListener("click", () => {
      closeScheduleEditModal();
    });

    document.getElementById("btn-save-edit-schedule").addEventListener("click", async () => {
      const title = document.getElementById("schedule-edit-title").value.trim();
      const startDate = document.getElementById("schedule-edit-start-date").value;
      const endDate = document.getElementById("schedule-edit-end-date").value;

      if (!title) {
        window.alert("作業内容を入力してください");
        return;
      }
      if (!isValidDateStr(startDate)) {
        window.alert("開始日を選択してください");
        return;
      }
      if (!isValidDateStr(endDate)) {
        window.alert("終了日を選択してください");
        return;
      }

      await updateScheduleItem(editingScheduleItemId, { title: title, startDate: startDate, endDate: endDate });
      closeScheduleEditModal();
      await renderMainArea();
    });

    document.getElementById("btn-expand-all").addEventListener("click", async () => {
      if (currentProjectId === null) return;
      await expandAllScheduleItems(currentProjectId);
      await renderMainArea();
    });

    document.getElementById("btn-milestones").addEventListener("click", async () => {
      await openMilestoneModal();
    });

    document.getElementById("btn-close-milestone-modal").addEventListener("click", () => {
      closeMilestoneModal();
    });

    document.getElementById("btn-add-milestone").addEventListener("click", async () => {
      if (currentProjectLocked) return;
      const date = document.getElementById("milestone-date").value;
      const label = document.getElementById("milestone-label").value.trim();

      if (!isValidDateStr(date)) {
        window.alert("日付を選択してください");
        return;
      }
      if (!label) {
        window.alert("ラベルを入力してください");
        return;
      }

      await addMilestone({ projectId: currentProjectId, date: date, label: label });
      document.getElementById("milestone-date").value = "";
      document.getElementById("milestone-label").value = "";
      await renderMilestoneList();
      await renderGanttChart();
    });

    document.getElementById("milestone-list").addEventListener("click", async (event) => {
      if (currentProjectLocked) return;
      const deleteButton = event.target.closest("[data-delete-milestone-id]");
      if (!deleteButton) return;

      const id = Number(deleteButton.dataset.deleteMilestoneId);
      await deleteMilestone(id);
      await renderMilestoneList();
      await renderGanttChart();
    });

    document.getElementById("period-select").addEventListener("change", async (event) => {
      currentPeriod = event.target.value;
      await renderGanttChart();
    });

    document.getElementById("col-toggle-start").addEventListener("change", async (event) => {
      visibleColumns.startDate = event.target.checked;
      await renderScheduleTable();
    });

    document.getElementById("col-toggle-end").addEventListener("change", async (event) => {
      visibleColumns.endDate = event.target.checked;
      await renderScheduleTable();
    });

    document.getElementById("col-toggle-status").addEventListener("change", async (event) => {
      visibleColumns.status = event.target.checked;
      await renderScheduleTable();
    });

    document.getElementById("btn-today").addEventListener("click", async () => {
      await renderGanttChart();
      scrollGanttToToday();
    });
  }
})();
</script>
</body>
</html>
